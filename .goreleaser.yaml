version: 2

project_name: coolify-tui

before:
  hooks:
    - go mod download
    - go test ./...

builds:
  - id: coolify-tui
    main: ./cmd/coolify-tui
    binary: coolify-tui
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .Date }}

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    files:
      - README.md
      - LICENSE

homebrew_casks:
  - name: coolify-tui
    binaries:
      - coolify-tui
    directory: Casks
    homepage: "https://github.com/micaelmcarvalho/coolify-tui"
    description: "Read-only terminal dashboard for Coolify"
    repository:
      owner: micaelmcarvalho
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    commit_author:
      name: github-actions[bot]
      email: 41898282+github-actions[bot]@users.noreply.github.com

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"

release:
  draft: false
  prerelease: auto
